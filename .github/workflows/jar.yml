name: Publish Release JAR

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew bootJar -PprojectVersion=${{ github.event.release.tag_name }}

      - name: Remove unnecessary JAR file
        run: |
          rm -f build/libs/*-plain.jar
          ls build/libs

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/libs/*.jar
